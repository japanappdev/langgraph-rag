<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 検索デモ</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Noto Sans JP', sans-serif; margin: 2rem; }
    .container { max-width: 820px; margin: auto; }
    input, button, textarea { font-size: 16px; }
    .row { display: flex; gap: 8px; }
    .query { flex: 1; padding: 10px; }
    .result { white-space: pre-wrap; background: #fafafa; padding: 12px; border: 1px solid #eee; border-radius: 8px; }
    .docs { margin-top: 1rem; }
    .doc { padding: 10px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 8px; background: #fff; }
    .muted { color: #666; font-size: 0.9em; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">
  <script>
    async function doSearch() {
      const query = document.getElementById('query').value.trim();
      const topk = Number(document.getElementById('topk').value || 4);
      if (!query) { alert('検索クエリを入力してください'); return; }
      const btn = document.getElementById('btn');
      btn.disabled = true; btn.textContent = '検索中…';
      try {
        const res = await fetch('/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, top_k: topk })
        });
        const data = await res.json();
        document.getElementById('answer').textContent = data.answer || '(回答なし)';
        const docsEl = document.getElementById('docs');
        docsEl.innerHTML = '';
        (data.contexts || []).forEach((d, i) => {
          const el = document.createElement('div');
          el.className = 'doc';
          el.innerHTML = `<div class="muted">DOC ${i+1} 距離: ${d.distance?.toFixed?.(3) ?? '-'} / ID: ${d.id}</div>` +
                         `<div>${(d.text || '').replace(/</g, '&lt;')}</div>`;
          docsEl.appendChild(el);
        });
      } catch (e) {
        alert('検索に失敗しました: ' + e);
      } finally {
        btn.disabled = false; btn.textContent = '検索';
      }
    }
  </script>
</head>
<body>
  <div class="container">
    <h1>RAG 検索デモ</h1>
    <p class="muted">ChromaDB + LangGraph + OpenAI / 日本語対応</p>
    <div class="row">
      <input id="query" class="query" placeholder="質問を入力 (例: LangGraphとは？)" />
      <input id="topk" type="number" min="1" max="10" value="4" style="width:80px;" />
      <button id="btn" onclick="doSearch()">検索</button>
    </div>
    <h3>回答</h3>
    <div id="answer" class="result">（ここに回答が表示されます）</div>
    <h3>参照ドキュメント</h3>
    <div id="docs" class="docs"></div>
  </div>
</body>
</html>
